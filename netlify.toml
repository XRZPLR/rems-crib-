[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Pretty URLs — /buying serves buying.html, /code/adminpanel serves code/adminpanel/index.html
[[redirects]]
  from = "/buying"
  to   = "/buying.html"
  status = 200

[[redirects]]
  from = "/contactus"
  to   = "/index.html"
  status = 302
